version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports

linters:
  enable:
    - gosec
#    - errcheck
    - exhaustive
#    - govet
    - staticcheck
    - unused
    - gocritic
    - gocognit
    - prealloc
    - unconvert
    - unparam
    - misspell
#    - revive
    - bodyclose
    - noctx
    - errorlint
    - nilerr
#    - goconst
    - thelper
    - usestdlibvars
    - reassign
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - gocognit
          - noctx
          - goconst
  disable:
    - errcheck
   
  settings:
    gosec:
      excludes: []
    gocognit:
      min-complexity: 30
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style

issues:
  max-issues-per-linter: 0
  max-same-issues: 0